<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦌 고라니 목장</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a1a0a;--panel:rgba(5,18,5,.96);--border:#2a4a2a;
  --accent:#5cb85c;--gold:#ffd700;--grass:#81c784;
  --text:#d4edda;--muted:#6a8a6a;
  --ok:#4caf50;--fail:#f44336;--warn:#ff9800;
}
body{background:var(--bg);color:var(--text);font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
  height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none;}

/* ── TOP BAR ── */
#topbar{background:var(--panel);border-bottom:2px solid var(--border);padding:6px 14px;
  display:flex;align-items:center;flex-shrink:0;z-index:10;}
.res{display:flex;align-items:center;gap:7px;padding:3px 14px;border-right:1px solid var(--border);}
.res:last-of-type{border-right:none;}
.res-icon{font-size:18px;}
.res-info{display:flex;flex-direction:column;}
.res-val{font-size:15px;font-weight:bold;line-height:1.1;}
.res-rate{font-size:10px;color:var(--muted);}
.grass-val{color:var(--grass);}.gold-val{color:var(--gold);}
#save-btn{margin-left:auto;background:none;border:1px solid var(--border);color:var(--muted);
  padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;transition:all .2s;}
#save-btn:hover{border-color:var(--accent);color:var(--text);}

/* ── LAYOUT ── */
#main{flex:1;display:grid;grid-template-columns:210px 1fr 255px;overflow:hidden;min-height:0;}

/* ── LEFT ── */
#left{background:var(--panel);border-right:2px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
.left-sec{padding:10px 12px;border-bottom:1px solid var(--border);}
.sec-title{font-size:10px;color:var(--accent);font-weight:bold;letter-spacing:1px;
  text-transform:uppercase;margin-bottom:7px;}
.stat-row{display:flex;justify-content:space-between;padding:3px 0;font-size:12px;
  border-bottom:1px solid rgba(255,255,255,.04);}
.stat-lbl{color:var(--muted);}.stat-val{font-weight:bold;}
/* guide */
.sg-row{display:flex;align-items:center;gap:8px;padding:5px 0;
  border-bottom:1px solid rgba(255,255,255,.04);}
.sg-row:last-child{border-bottom:none;}
.sg-thumb{width:36px;height:36px;object-fit:contain;border-radius:6px;
  background:rgba(0,0,0,.35);flex-shrink:0;}
.sg-embox{width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  font-size:26px;background:rgba(0,0,0,.35);border-radius:6px;flex-shrink:0;}
.sg-info{flex:1;min-width:0;}
.sg-name{font-size:11px;font-weight:bold;}
.sg-sub{font-size:10px;color:var(--muted);}
.sg-bar{height:4px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:3px;overflow:hidden;}
.sg-fill{height:100%;border-radius:2px;}

/* ── CENTER ── */
#center{display:flex;flex-direction:column;overflow:hidden;}
#center-hdr{padding:8px 14px;border-bottom:1px solid var(--border);display:flex;
  align-items:center;justify-content:space-between;flex-shrink:0;background:var(--panel);}
#center-hdr h3{font-size:13px;color:var(--accent);}
#slot-info{font-size:12px;color:var(--muted);}
#buy-btn{background:linear-gradient(135deg,#1b5e20,#4caf50);border:none;color:#fff;
  padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:bold;
  transition:all .2s;white-space:nowrap;}
#buy-btn:hover:not(:disabled){opacity:.85;transform:scale(1.03);}
#buy-btn:disabled{opacity:.33;cursor:not-allowed;transform:none;}
#drag-hint{padding:4px 14px;font-size:11px;color:#4a7a2a;background:rgba(200,240,160,.25);
  border-bottom:1px solid var(--border);flex-shrink:0;text-align:center;}

/* ── PASTURE ── */
#pasture{flex:1;position:relative;overflow:hidden;
  background:linear-gradient(180deg,#87ceeb 0%,#b0e0f5 30%,#c8f0a0 55%,#7ec850 100%);}
/* 땅 */
#pground{position:absolute;bottom:0;left:0;right:0;height:90px;
  background:linear-gradient(180deg,#7ec850 0%,#5aaa28 60%,#3d8a10 100%);
  pointer-events:none;z-index:1;}
#pfence-l,#pfence-r{position:absolute;bottom:85px;font-size:28px;
  pointer-events:none;z-index:2;opacity:.85;}
#pfence-l{left:2%;}#pfence-r{right:2%;}
/* 구름 */
.cloud{position:absolute;pointer-events:none;opacity:.88;
  animation:cfloat var(--cd,18s) linear infinite var(--co,0s);}
@keyframes cfloat{from{transform:translateX(-140px);}to{transform:translateX(calc(100vw + 140px));}}
/* 나무 */
.bg-tree{position:absolute;bottom:84px;font-size:var(--sz,60px);pointer-events:none;
  animation:sway var(--sw,5s) ease-in-out infinite var(--sd,0s);}
@keyframes sway{0%,100%{transform:rotate(-1.5deg);}50%{transform:rotate(1.5deg) translateX(2px);}}
/* 꽃/풀 */
.pgrass{position:absolute;bottom:88px;font-size:16px;opacity:.9;pointer-events:none;}
/* 햇빛 */
#psun{position:absolute;top:14px;right:55px;font-size:44px;pointer-events:none;
  animation:sunpulse 4s ease-in-out infinite;}
@keyframes sunpulse{0%,100%{filter:drop-shadow(0 0 8px rgba(255,220,0,.5));}
  50%{filter:drop-shadow(0 0 22px rgba(255,220,0,.9));}}

/* ── DEER ELEMENT ── */
.deer-el{position:absolute;transform:translate(-50%,-50%);z-index:10;
  cursor:grab;-webkit-user-drag:none;}
.deer-el.dragging{cursor:grabbing;z-index:100;}
.deer-el.dragging .deer-inner{
  filter:drop-shadow(0 0 14px rgba(255,255,255,.55))!important;
  transform:scale(1.18)!important;}
.deer-el.can-merge .deer-inner{animation:mpulse .65s ease-in-out infinite;}
@keyframes mpulse{0%,100%{filter:drop-shadow(0 0 5px var(--warn));}
  50%{filter:drop-shadow(0 0 18px var(--warn));}}

.deer-inner{display:flex;flex-direction:column;align-items:center;gap:3px;
  transition:filter .15s,transform .15s;
  animation:dbob var(--bob,.9s) ease-in-out infinite;}
.deer-el.dragging .deer-inner{animation:none;}
@keyframes dbob{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}

.deer-inner img{width:64px;height:64px;object-fit:contain;display:block;pointer-events:none;
  filter:drop-shadow(0 3px 8px rgba(0,0,0,.7));}
.deer-inner img.err{display:none;}
.d-fallback{font-size:52px;line-height:1;display:none;pointer-events:none;}
.deer-inner img.err~.d-fallback{display:block;}

.deer-lv{font-size:10px;font-weight:bold;color:var(--accent);
  background:rgba(0,0,0,.78);padding:1px 8px;border-radius:10px;
  pointer-events:none;white-space:nowrap;}

/* ── RIGHT ── */
#right{background:var(--panel);border-left:2px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
#shop-hdr{padding:10px 12px 6px;border-bottom:1px solid var(--border);flex-shrink:0;}
#shop-hdr h3{font-size:13px;color:var(--accent);font-weight:bold;}
#upg-list{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:5px;}
.upg{background:rgba(255,255,255,.03);border:1px solid rgba(92,184,92,.17);border-radius:8px;
  padding:8px 10px;cursor:pointer;transition:all .14s;}
.upg:hover:not(.no-gold):not(.maxed){background:rgba(92,184,92,.1);
  border-color:rgba(92,184,92,.44);transform:translateX(-2px);}
.upg.can-buy{border-color:rgba(92,184,92,.36);}
.upg.no-gold{opacity:.48;cursor:not-allowed;}
.upg.maxed{opacity:.5;border-color:rgba(255,215,0,.28);cursor:default;}
.upg-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;}
.upg-name{font-size:12px;font-weight:bold;}
.upg-lvs{font-size:10px;color:var(--accent);}
.upg-desc{font-size:11px;color:var(--muted);margin-bottom:4px;}
.upg-cost{font-size:12px;color:var(--gold);}
.upg-maxlbl{font-size:12px;color:var(--gold);}

/* ── MERGE MODAL ── */
#merge-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);
  z-index:500;align-items:center;justify-content:center;}
#merge-wrap.show{display:flex;}
.m-modal{background:#0a1f0a;border:2px solid var(--accent);border-radius:16px;
  padding:28px 30px;text-align:center;max-width:320px;width:92%;}
.m-modal.fborder{border-color:var(--fail);}
.m-title{font-size:22px;font-weight:bold;margin-bottom:12px;}
.m-title.s{color:var(--ok);}.m-title.f{color:var(--fail);}
.m-imgw{width:100px;height:100px;margin:8px auto;display:flex;align-items:center;justify-content:center;}
.m-imgw img{max-width:100%;max-height:100%;object-fit:contain;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,.7));}
.m-emoji{font-size:80px;}
.m-desc{color:var(--muted);font-size:13px;margin:8px 0 4px;}
.m-rate{font-size:12px;color:var(--muted);}
.m-btn{margin-top:16px;border:none;padding:10px 28px;border-radius:22px;
  cursor:pointer;font-size:15px;font-weight:bold;}
.m-btn.ok{background:var(--ok);color:#fff;}
.m-btn.fail{background:var(--fail);color:#fff;}
.m-btn:hover{opacity:.85;}

/* ── OFFLINE MODAL ── */
#off-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);
  z-index:500;align-items:center;justify-content:center;}
#off-wrap.show{display:flex;}
.off-modal{background:#0a1f0a;border:2px solid var(--accent);border-radius:16px;
  padding:28px;text-align:center;max-width:300px;width:92%;}
.off-modal h2{color:var(--accent);margin-bottom:10px;font-size:18px;}
.off-reward{font-size:18px;color:var(--grass);font-weight:bold;margin:10px 0;}
.off-btn{margin-top:12px;background:var(--accent);color:#0a1f0a;border:none;
  padding:10px 26px;border-radius:22px;cursor:pointer;font-size:14px;font-weight:bold;}

/* ── NOTIFICATIONS ── */
#notifs{position:fixed;top:52px;right:14px;z-index:600;
  display:flex;flex-direction:column;gap:5px;pointer-events:none;}
.notif{background:rgba(5,28,5,.97);border:1px solid var(--accent);border-radius:8px;
  padding:7px 13px;font-size:13px;max-width:240px;animation:nslide .3s ease-out;}
@keyframes nslide{from{opacity:0;transform:translateX(60px);}to{opacity:1;transform:translateX(0);}}
.notif-gold{border-color:var(--gold);}
.notif-ok{border-color:var(--ok);}
.notif-fail{border-color:var(--fail);}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<div id="topbar">
  <div class="res">
    <span class="res-icon">🌿</span>
    <div class="res-info">
      <span class="res-val grass-val" id="r-grass">0</span>
      <span class="res-rate" id="r-gps">+0/초</span>
    </div>
  </div>
  <div class="res">
    <span class="res-icon">💰</span>
    <div class="res-info">
      <span class="res-val gold-val" id="r-gold">0</span>
      <span class="res-rate" id="r-goldps">+0/초</span>
    </div>
  </div>
  <button id="save-btn" onclick="saveGame()">💾 저장</button>
</div>

<div id="main">
  <!-- LEFT -->
  <div id="left">
    <div class="left-sec">
      <div class="sec-title">📊 목장 현황</div>
      <div class="stat-row"><span class="stat-lbl">보유 고라니</span><span class="stat-val" id="st-count">0마리</span></div>
      <div class="stat-row"><span class="stat-lbl">풀 생산/초</span><span class="stat-val" id="st-gps">0</span></div>
      <div class="stat-row"><span class="stat-lbl">골드 생산/초</span><span class="stat-val" id="st-goldps">0</span></div>
      <div class="stat-row"><span class="stat-lbl">합치기 시도</span><span class="stat-val" id="st-merges">0회</span></div>
      <div class="stat-row"><span class="stat-lbl">✅ 성공</span><span class="stat-val" id="st-ok" style="color:var(--ok)">0회</span></div>
      <div class="stat-row"><span class="stat-lbl">❌ 실패</span><span class="stat-val" id="st-fail" style="color:var(--fail)">0회</span></div>
      <div class="stat-row"><span class="stat-lbl">총 풀 생산</span><span class="stat-val" id="st-tg">0</span></div>
      <div class="stat-row"><span class="stat-lbl">총 골드 획득</span><span class="stat-val" id="st-tm">0</span></div>
    </div>
    <div class="left-sec">
      <div class="sec-title">🦌 고라니 도감</div>
      <div id="stage-guide"></div>
    </div>
  </div>

  <!-- CENTER -->
  <div id="center">
    <div id="center-hdr">
      <h3>🌾 고라니 목장</h3>
      <span id="slot-info">0 / 0 마리</span>
      <button id="buy-btn" onclick="buyDeer()">🦌 구매 (50🌿)</button>
    </div>
    <div id="drag-hint">🖱️ 같은 단계 고라니에게 드래그해서 놓으면 합치기 시도!</div>
    <div id="pasture">
      <div id="pground"></div>
      <div id="psun">☀️</div>
      <div id="pfence-l">🪵🪵🪵</div>
      <div id="pfence-r">🪵🪵🪵</div>
    </div>
  </div>

  <!-- RIGHT -->
  <div id="right">
    <div id="shop-hdr"><h3>🏪 업그레이드 상점</h3></div>
    <div id="upg-list"></div>
  </div>
</div>

<div id="notifs"></div>

<!-- MERGE MODAL -->
<div id="merge-wrap">
  <div class="m-modal" id="m-modal">
    <div class="m-title" id="m-title"></div>
    <div class="m-imgw" id="m-imgw"></div>
    <div class="m-desc" id="m-desc"></div>
    <div class="m-rate" id="m-rate"></div>
    <button class="m-btn" id="m-btn" onclick="closeMerge()">확인</button>
  </div>
</div>

<!-- OFFLINE MODAL -->
<div id="off-wrap">
  <div class="off-modal">
    <h2>🦌 돌아오셨군요!</h2>
    <p id="off-text" style="color:var(--muted);font-size:13px;margin-bottom:4px;"></p>
    <div class="off-reward" id="off-reward"></div>
    <button class="off-btn" onclick="closeOffline()">고마워요! 🌿</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// 설정
// ══════════════════════════════════════════
// 이미지 파일: deer1.png ~ deer5.png (index.html 과 같은 폴더)
const STAGES = [
  {level:1, img:'deer1.png', emoji:'🦌', name:'아기 고라니',  gps:1,   goldps:0.5, mergeRate:0.80, spd:7},
  {level:2, img:'deer2.png', emoji:'🦌', name:'어린 고라니',  gps:5,   goldps:2,   mergeRate:0.65, spd:6},
  {level:3, img:'deer3.png', emoji:'🦌', name:'청년 고라니',  gps:18,  goldps:8,   mergeRate:0.45, spd:8},
  {level:4, img:'deer4.png', emoji:'🦌', name:'전설 고라니',  gps:65,  goldps:30,  mergeRate:0.25, spd:5},
  {level:5, img:'deer5.png', emoji:'🧑', name:'만렙 고라니',  gps:250, goldps:110, mergeRate:null, spd:4},
];

const UPGRADES = [
  {id:'pasture',  icon:'🌾', name:'풀밭 확장',   maxLv:10,
   desc:lv=>`풀 생산 +${(lv+1)*25}%`,
   cost:lv=>Math.floor(40*Math.pow(2.2,lv))},
  {id:'goldmine', icon:'⛏️', name:'금광 개발',   maxLv:8,
   desc:lv=>`골드 생산 +${(lv+1)*25}%`,
   cost:lv=>Math.floor(60*Math.pow(2.4,lv))},
  {id:'lucky',    icon:'🍀', name:'행운의 부적', maxLv:5,
   desc:lv=>`합치기 성공률 +${(lv+1)*4}%`,
   cost:lv=>Math.floor(100*Math.pow(3,lv))},
  {id:'slots',    icon:'🏡', name:'목장 확장',   maxLv:3,
   desc:lv=>`최대 고라니 +4마리 (→ ${8+(lv+1)*4}마리)`,
   cost:lv=>Math.floor(250*Math.pow(4,lv))},
  {id:'forest',   icon:'✨', name:'숲의 마법',   maxLv:3,
   desc:lv=>`전체 생산 ×${Math.pow(2,lv+1)}`,
   cost:lv=>Math.floor(600*Math.pow(8,lv))},
  {id:'autobell', icon:'🔔', name:'자동 수확',   maxLv:5,
   desc:lv=>`${6-lv}초마다 골드 자동 수확`,
   cost:lv=>Math.floor(80*Math.pow(2.8,lv))},
];

// ══════════════════════════════════════════
// 상태
// ══════════════════════════════════════════
const S = {
  grass:0, gold:0,
  totalGrass:0, totalGold:0,
  totalMerges:0, totalSuccess:0, totalFails:0,
  deer:[], nextId:1,
  upgrades:{pasture:0,goldmine:0,lucky:0,slots:0,forest:0,autobell:0},
  startTime:Date.now(), lastSave:Date.now(),
  bellAcc:0, shopDirty:true,
};

function maxDeer()    { return 8 + S.upgrades.slots * 4; }
function totalGps()   {
  let g = S.deer.reduce((a,d) => a + STAGES[d.level-1].gps, 0);
  g *= 1 + S.upgrades.pasture * 0.25;
  g *= Math.pow(2, S.upgrades.forest);
  return g;
}
function totalGoldps(){
  let g = S.deer.reduce((a,d) => a + STAGES[d.level-1].goldps, 0);
  g *= 1 + S.upgrades.goldmine * 0.25;
  g *= Math.pow(2, S.upgrades.forest);
  return g;
}
function luckyBonus() { return S.upgrades.lucky * 0.04; }
function buyCost()    { return Math.floor(50 * Math.pow(1.6, Math.max(0, S.deer.length - 1))); }

// ══════════════════════════════════════════
// 자원 틱 (100ms)
// ══════════════════════════════════════════
let lastTick = Date.now();
function tick() {
  const now = Date.now(), dt = Math.min((now - lastTick) / 1000, 2);
  lastTick = now;
  const g = totalGps() * dt, gld = totalGoldps() * dt;
  S.grass += g; S.totalGrass += g;
  S.gold  += gld; S.totalGold  += gld;
  if (S.upgrades.autobell > 0) {
    S.bellAcc += dt;
    const itv = 6 - S.upgrades.autobell;
    while (S.bellAcc >= itv) {
      S.bellAcc -= itv;
      const e = Math.floor(1 + S.upgrades.goldmine * 0.3);
      S.gold += e; S.totalGold += e;
    }
  }
  render();
}

// ══════════════════════════════════════════
// 고라니 배회 애니메이션 (requestAnimationFrame)
// ══════════════════════════════════════════
let lastAnim = Date.now();
function animLoop() {
  const now = Date.now(), dt = Math.min((now - lastAnim) / 1000, 0.08);
  lastAnim = now;
  S.deer.forEach(d => {
    if (d.dragging) return;
    const dx = d.tx - d.x, dy = d.ty - d.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < 2.5) {
      d.wait = (d.wait || 0) - dt;
      if (d.wait <= 0) {
        d.tx   = 6  + Math.random() * 88;
        d.ty   = 6  + Math.random() * 76;
        d.wait = 1.2 + Math.random() * 3;
      }
    } else {
      const spd = d.spd * dt;
      const nx = dx/dist*spd, ny = dy/dist*spd;
      d.flipX = nx < 0;
      d.x = Math.max(4, Math.min(96, d.x + nx));
      d.y = Math.max(4, Math.min(86, d.y + ny));
    }
    const el = document.getElementById('deer-el-' + d.id);
    if (!el) return;
    el.style.left = d.x + '%';
    el.style.top  = d.y + '%';
    const img = el.querySelector('img, .d-fallback');
    if (img) img.style.transform = d.flipX ? 'scaleX(-1)' : 'scaleX(1)';
  });
  requestAnimationFrame(animLoop);
}

// ══════════════════════════════════════════
// 드래그 & 드롭 합치기
// ══════════════════════════════════════════
let dragId = null, dragOX = 0, dragOY = 0;

function getPasture() { return document.getElementById('pasture'); }

function startDrag(e, id) {
  e.preventDefault();
  e.stopPropagation();
  dragId = id;
  const d = S.deer.find(x => x.id === id);
  if (!d) return;
  d.dragging = true;

  const cl = e.touches ? e.touches[0] : e;
  const r  = getPasture().getBoundingClientRect();
  dragOX   = cl.clientX - r.left - d.x / 100 * r.width;
  dragOY   = cl.clientY - r.top  - d.y / 100 * r.height;

  document.getElementById('deer-el-' + id).classList.add('dragging');

  // 같은 레벨 고라니 강조
  const stage = STAGES[d.level - 1];
  if (stage.mergeRate !== null) {
    S.deer.forEach(x => {
      if (x.id !== id && x.level === d.level)
        document.getElementById('deer-el-' + x.id)?.classList.add('can-merge');
    });
  }
}

function onMove(cx, cy) {
  if (dragId === null) return;
  const d = S.deer.find(x => x.id === dragId);
  if (!d) return;
  const r = getPasture().getBoundingClientRect();
  d.x = Math.max(4, Math.min(96, (cx - r.left - dragOX) / r.width  * 100));
  d.y = Math.max(4, Math.min(86, (cy - r.top  - dragOY) / r.height * 100));
  const el = document.getElementById('deer-el-' + dragId);
  if (el) { el.style.left = d.x + '%'; el.style.top = d.y + '%'; }
}

function onDrop() {
  if (dragId === null) return;
  const d = S.deer.find(x => x.id === dragId);
  S.deer.forEach(x => document.getElementById('deer-el-' + x.id)?.classList.remove('can-merge'));
  if (!d) { dragId = null; return; }
  d.dragging = false;
  document.getElementById('deer-el-' + dragId)?.classList.remove('dragging');

  const target = findMergeTarget(d);
  dragId = null;
  if (target) doMerge(d, target);
}

function findMergeTarget(d) {
  const p  = getPasture();
  const pw = p.clientWidth, ph = p.clientHeight;
  const ax = d.x / 100 * pw, ay = d.y / 100 * ph;
  const THRESH = 72;
  return S.deer.find(x => {
    if (x.id === d.id || x.level !== d.level) return false;
    const bx = x.x / 100 * pw, by = x.y / 100 * ph;
    return Math.sqrt((ax-bx)**2 + (ay-by)**2) < THRESH;
  }) || null;
}

document.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
document.addEventListener('mouseup',   () => onDrop());
document.addEventListener('touchmove', e => {
  if (dragId !== null) { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }
}, {passive: false});
document.addEventListener('touchend', () => onDrop());

// ══════════════════════════════════════════
// 합치기 로직
// ══════════════════════════════════════════
function doMerge(a, b) {
  const stage = STAGES[a.level - 1];
  if (!stage.mergeRate) { notify('만렙 고라니는 합칠 수 없어요! 👑'); return; }

  const rate = Math.min(stage.mergeRate + luckyBonus(), 0.95);
  S.totalMerges++;

  const spawnX = a.x, spawnY = a.y;
  removeDeer(a.id);
  removeDeer(b.id);

  if (Math.random() < rate) {
    S.totalSuccess++;
    const newLvl = Math.min(a.level + 1, STAGES.length);
    const nd = makeDeerObj(newLvl, spawnX, spawnY);
    S.deer.push(nd);
    spawnEl(nd);
    showMergeModal(true, newLvl, rate);
  } else {
    S.totalFails++;
    const nd = makeDeerObj(a.level, spawnX, spawnY);
    S.deer.push(nd);
    spawnEl(nd);
    showMergeModal(false, a.level, rate);
  }
  updateHdr();
  S.shopDirty = true;
}

// ══════════════════════════════════════════
// 구매
// ══════════════════════════════════════════
function buyDeer() {
  if (S.deer.length >= maxDeer()) {
    notify('목장이 가득 찼어요! 🏡 목장 확장을 업그레이드하세요.');
    return;
  }
  const cost = buyCost();
  if (S.grass < cost) { notify(`풀이 부족해요! (필요: ${fmt(cost)}🌿)`); return; }
  S.grass -= cost;
  const d = makeDeerObj(1);
  S.deer.push(d);
  spawnEl(d);
  notify('🦌 아기 고라니가 새로 왔어요!');
  updateHdr();
}

// ══════════════════════════════════════════
// 고라니 오브젝트 생성
// ══════════════════════════════════════════
function makeDeerObj(level, x, y) {
  const stage = STAGES[level - 1];
  return {
    id: S.nextId++,
    level,
    x:    x !== undefined ? x : 10 + Math.random() * 80,
    y:    y !== undefined ? y : 10 + Math.random() * 76,
    tx:   10 + Math.random() * 80,
    ty:   10 + Math.random() * 76,
    spd:  stage.spd + (Math.random() - 0.5) * 2,
    wait: 0, flipX: false, dragging: false,
  };
}

// ══════════════════════════════════════════
// DOM – 고라니 요소 생성/제거
// ══════════════════════════════════════════
function spawnEl(d) {
  const stage = STAGES[d.level - 1];
  const el = document.createElement('div');
  el.id = 'deer-el-' + d.id;
  el.className = 'deer-el';
  el.style.cssText = `left:${d.x}%;top:${d.y}%;--bob:${0.7 + Math.random() * 0.5}s`;

  const inner = document.createElement('div');
  inner.className = 'deer-inner';
  inner.style.animationDelay = (Math.random() * 0.8) + 's';

  const img = document.createElement('img');
  img.src = stage.img; img.alt = stage.name;
  img.onerror = function() {
    this.classList.add('err');
    if (!this.nextElementSibling || !this.nextElementSibling.classList.contains('d-fallback')) {
      const fb = document.createElement('span');
      fb.className = 'd-fallback'; fb.textContent = stage.emoji;
      this.parentNode.insertBefore(fb, this.nextSibling);
    }
  };

  const lv = document.createElement('div');
  lv.className = 'deer-lv';
  lv.textContent = 'Lv.' + d.level;

  inner.appendChild(img);
  inner.appendChild(lv);
  el.appendChild(inner);

  el.addEventListener('mousedown', e => startDrag(e, d.id));
  el.addEventListener('touchstart', e => { e.preventDefault(); startDrag(e, d.id); }, {passive:false});

  getPasture().appendChild(el);
}

function removeDeer(id) {
  document.getElementById('deer-el-' + id)?.remove();
  S.deer = S.deer.filter(d => d.id !== id);
}

function syncEls() {
  S.deer.forEach(d => { if (!document.getElementById('deer-el-' + d.id)) spawnEl(d); });
  document.querySelectorAll('[id^="deer-el-"]').forEach(el => {
    const id = parseInt(el.id.replace('deer-el-', ''));
    if (!S.deer.find(d => d.id === id)) el.remove();
  });
  updateHdr();
}

function updateHdr() {
  const cost = buyCost();
  document.getElementById('buy-btn').textContent = `🦌 구매 (${fmt(cost)}🌿)`;
  document.getElementById('buy-btn').disabled = S.deer.length >= maxDeer();
  document.getElementById('slot-info').textContent = `${S.deer.length} / ${maxDeer()} 마리`;
}

// ══════════════════════════════════════════
// 배경 장식
// ══════════════════════════════════════════
function initBg() {
  const p = getPasture();

  // 구름
  const cloudEmojis = ['☁️','⛅','🌤️'];
  [
    {top:'8%',  cd:'22s', co:'0s'},
    {top:'14%', cd:'30s', co:'-8s'},
    {top:'5%',  cd:'26s', co:'-14s'},
    {top:'20%', cd:'35s', co:'-4s'},
  ].forEach(c => {
    const el = document.createElement('div'); el.className = 'cloud';
    el.style.cssText = `top:${c.top};--cd:${c.cd};--co:${c.co};font-size:${36+Math.random()*20}px;`;
    el.textContent = cloudEmojis[Math.floor(Math.random()*cloudEmojis.length)];
    p.appendChild(el);
  });

  // 나무 (배경 양 끝)
  [
    {l:'1%',  sz:'62px', sw:'6s',  sd:'0s',  em:'🌳'},
    {l:'9%',  sz:'78px', sw:'5s',  sd:'.5s', em:'🌲'},
    {l:'88%', sz:'70px', sw:'5.5s',sd:'.3s', em:'🌳'},
    {l:'95%', sz:'84px', sw:'6.5s',sd:'.8s', em:'🌲'},
  ].forEach(t => {
    const el = document.createElement('div'); el.className = 'bg-tree';
    el.style.cssText = `left:${t.l};--sz:${t.sz};--sw:${t.sw};--sd:${t.sd}`;
    el.textContent = t.em; p.appendChild(el);
  });

  // 꽃과 풀
  const flora = ['🌸','🌼','🌻','🌷','🌿','🍀','🌺'];
  [8, 18, 30, 42, 55, 65, 75, 85, 93].forEach(pct => {
    const g = document.createElement('div'); g.className = 'pgrass';
    g.style.left = pct + '%';
    g.textContent = flora[Math.floor(Math.random()*flora.length)];
    p.appendChild(g);
  });
}

// ══════════════════════════════════════════
// 합치기 결과 모달
// ══════════════════════════════════════════
function showMergeModal(ok, lvl, rate) {
  const stage = STAGES[lvl - 1];
  document.getElementById('m-modal').className = 'm-modal' + (ok ? '' : ' fborder');
  document.getElementById('m-title').textContent = ok ? '🎉 합치기 성공!' : '💔 합치기 실패...';
  document.getElementById('m-title').className   = 'm-title ' + (ok ? 's' : 'f');
  document.getElementById('m-desc').textContent  =
    ok ? `${stage.name} 등장!` : `고라니 한 마리가 사라졌어요...`;
  document.getElementById('m-rate').textContent  = `성공 확률: ${Math.round(rate * 100)}%`;

  const w = document.getElementById('m-imgw'); w.innerHTML = '';
  const img = document.createElement('img');
  img.src = stage.img;
  img.onerror = () => {
    img.style.display = 'none';
    const sp = document.createElement('span'); sp.className = 'm-emoji';
    sp.textContent = stage.emoji; w.appendChild(sp);
  };
  w.appendChild(img);

  const btn = document.getElementById('m-btn');
  btn.className   = 'm-btn ' + (ok ? 'ok' : 'fail');
  btn.textContent = ok ? '🎊 좋아!' : '😢 다음엔 성공!';
  document.getElementById('merge-wrap').classList.add('show');
}
function closeMerge()  { document.getElementById('merge-wrap').classList.remove('show'); }
function closeOffline(){ document.getElementById('off-wrap').classList.remove('show'); }

// ══════════════════════════════════════════
// 상점
// ══════════════════════════════════════════
function renderShop() {
  const list = document.getElementById('upg-list'); list.innerHTML = '';
  UPGRADES.forEach(u => {
    const lv = S.upgrades[u.id], maxed = lv >= u.maxLv;
    const cost = maxed ? 0 : u.cost(lv), canBuy = !maxed && S.gold >= cost;
    const c = document.createElement('div');
    c.className = 'upg ' + (maxed ? 'maxed' : canBuy ? 'can-buy' : 'no-gold');
    c.innerHTML =
      `<div class="upg-top"><div class="upg-name">${u.icon} ${u.name}</div>`
      + `<div class="upg-lvs">${lv}/${u.maxLv}</div></div>`
      + `<div class="upg-desc">${u.desc(lv)}</div>`
      + (maxed
        ? `<div class="upg-maxlbl">✅ 최대 레벨</div>`
        : `<div class="upg-cost">💰 ${fmt(cost)} 골드</div>`);
    if (!maxed) c.onclick = () => buyUpg(u.id);
    list.appendChild(c);
  });
  S.shopDirty = false;
}

function buyUpg(id) {
  const u = UPGRADES.find(x => x.id === id); if (!u) return;
  const lv = S.upgrades[id]; if (lv >= u.maxLv) return;
  const cost = u.cost(lv);
  if (S.gold < cost) { notify('골드가 부족해요! 💸'); return; }
  S.gold -= cost; S.upgrades[id]++;
  notify(`${u.icon} ${u.name} Lv.${S.upgrades[id]}!`, 'gold');
  S.shopDirty = true;
}

// ══════════════════════════════════════════
// 도감
// ══════════════════════════════════════════
function renderGuide() {
  const el = document.getElementById('stage-guide'); el.innerHTML = '';
  STAGES.forEach(s => {
    const row = document.createElement('div'); row.className = 'sg-row';
    const img = document.createElement('img');
    img.src = s.img; img.className = 'sg-thumb'; img.alt = s.name;
    img.onerror = function() {
      this.style.display = 'none';
      const b = document.createElement('div'); b.className = 'sg-embox';
      b.textContent = s.emoji; row.insertBefore(b, this.nextSibling);
    };
    const info = document.createElement('div'); info.className = 'sg-info';
    const nm   = document.createElement('div'); nm.className = 'sg-name';
    nm.textContent = `Lv.${s.level} ${s.name}`;
    const sub  = document.createElement('div'); sub.className = 'sg-sub';
    sub.textContent = s.mergeRate
      ? `성공률 ${Math.round(s.mergeRate*100)}% | +${s.gps}🌿/초`
      : `최고 단계 👑 | +${s.gps}🌿/초`;
    const bar  = document.createElement('div'); bar.className = 'sg-bar';
    const fill = document.createElement('div'); fill.className = 'sg-fill';
    fill.style.cssText = `width:${(s.mergeRate||1)*100}%;`
      + `background:${s.mergeRate ? `hsl(${s.mergeRate*120},65%,42%)` : 'var(--gold)'}`;
    bar.appendChild(fill);
    info.appendChild(nm); info.appendChild(sub); info.appendChild(bar);
    row.appendChild(img); row.appendChild(info); el.appendChild(row);
  });
}

// ══════════════════════════════════════════
// 렌더 (통계 & 상단바)
// ══════════════════════════════════════════
let raf = false;
function render() { if(raf)return; raf=true; requestAnimationFrame(()=>{raf=false;doRender();}); }
function doRender() {
  const g = totalGps(), gld = totalGoldps();
  document.getElementById('r-grass').textContent  = fmt(S.grass);
  document.getElementById('r-gps').textContent    = `+${fmt(g)}/초`;
  document.getElementById('r-gold').textContent   = fmt(S.gold);
  document.getElementById('r-goldps').textContent = `+${fmt(gld)}/초`;
  document.getElementById('st-count').textContent = S.deer.length + '마리';
  document.getElementById('st-gps').textContent   = fmt(g);
  document.getElementById('st-goldps').textContent= fmt(gld);
  document.getElementById('st-merges').textContent= S.totalMerges + '회';
  document.getElementById('st-ok').textContent    = S.totalSuccess + '회';
  document.getElementById('st-fail').textContent  = S.totalFails + '회';
  document.getElementById('st-tg').textContent    = fmt(Math.floor(S.totalGrass));
  document.getElementById('st-tm').textContent    = fmt(Math.floor(S.totalGold));
  if (S.shopDirty) renderShop();
}

// ══════════════════════════════════════════
// 저장 / 불러오기
// ══════════════════════════════════════════
function saveGame() {
  S.lastSave = Date.now();
  localStorage.setItem('gorani_v3', JSON.stringify(S));
  notify('💾 저장 완료!');
}
function loadGame() {
  const raw = localStorage.getItem('gorani_v3'); if (!raw) return false;
  try {
    const d = JSON.parse(raw);
    Object.assign(S, d);
    const offSec = Math.min((Date.now() - S.lastSave) / 1000, 3600 * 8);
    if (offSec > 60) {
      const g = totalGps()*offSec, gld = totalGoldps()*offSec;
      S.grass += g; S.totalGrass += g; S.gold += gld; S.totalGold += gld;
      document.getElementById('off-text').textContent = `${Math.floor(offSec/60)}분 동안 목장을 비웠어요!`;
      document.getElementById('off-reward').textContent = `+${fmt(Math.floor(g))} 🌿  +${fmt(Math.floor(gld))} 💰`;
      document.getElementById('off-wrap').classList.add('show');
    }
    return true;
  } catch(e) { console.error(e); return false; }
}

// ══════════════════════════════════════════
// 유틸
// ══════════════════════════════════════════
function notify(msg, type='') {
  const c = document.getElementById('notifs');
  const el = document.createElement('div');
  el.className = 'notif'
    + (type==='gold'?' notif-gold':type==='ok'?' notif-ok':type==='fail'?' notif-fail':'');
  el.textContent = msg; c.appendChild(el);
  setTimeout(() => el.remove(), 2800);
}
function fmt(n) {
  n = Math.floor(n);
  if (n >= 1e12) return (n/1e12).toFixed(1)+'T';
  if (n >= 1e9)  return (n/1e9).toFixed(1)+'B';
  if (n >= 1e6)  return (n/1e6).toFixed(1)+'M';
  if (n >= 1e4)  return (n/1e3).toFixed(1)+'K';
  return n.toLocaleString('ko-KR');
}

// ══════════════════════════════════════════
// 초기화
// ══════════════════════════════════════════
window.addEventListener('load', () => {
  initBg();
  const loaded = loadGame();
  if (!loaded || S.deer.length === 0) {
    S.deer.push(makeDeerObj(1));
  }
  // 저장 데이터에 위치 정보 없을 경우 보정
  S.deer.forEach(d => {
    if (d.x   === undefined) d.x   = 10 + Math.random() * 80;
    if (d.y   === undefined) d.y   = 10 + Math.random() * 76;
    if (d.tx  === undefined) d.tx  = 10 + Math.random() * 80;
    if (d.ty  === undefined) d.ty  = 10 + Math.random() * 76;
    if (d.spd === undefined) d.spd = STAGES[d.level-1].spd + (Math.random()-.5)*2;
    if (d.wait=== undefined) d.wait= 0;
  });
  syncEls();
  renderGuide();
  renderShop();
  setInterval(tick, 100);
  setInterval(saveGame, 30000);
  requestAnimationFrame(animLoop);
});
</script>
